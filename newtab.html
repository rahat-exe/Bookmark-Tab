<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Tab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="newtab.css" />
</head>
<body>

  <div class="bg-layer"></div>

  <header class="site-header">
    <div class="header-left">
      <h1 class="wordmark">Marks</h1>
      <span class="count-badge" id="countBadge">—</span>
    </div>
    <div class="header-right">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.5"/>
          <path d="M13.5 13.5L17 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input type="text" id="searchInput" class="search-input" placeholder="Filter bookmarks…" autocomplete="off" />
      </div>
      <div class="time-display" id="timeDisplay"></div>
    </div>
  </header>

  <main class="main-content">
    <div class="folder-nav" id="folderNav"></div>
    <div class="grid" id="bookmarkGrid"></div>
    <div class="empty-state hidden" id="emptyState">
      <span class="empty-icon">◎</span>
      <p>No bookmarks found</p>
    </div>
  </main>

  <script src="newtab.js"></script>
</body>
</html>
